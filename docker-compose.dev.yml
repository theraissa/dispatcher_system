services:

  backend:
      build: ./backend
      ports:
        - "5000:5000"
      volumes:
        - ./backend:/app
      environment:
        - FLASK_ENV=development
        - FLASK_DEBUG=1
      command: python app.py

  frontend:
    image: node:20-alpine 
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: db-system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - database
